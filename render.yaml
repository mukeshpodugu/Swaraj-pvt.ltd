services:
  # Backend API Service (Docker Build)
  - type: web
    name: swaraj-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: swaraj-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://swaraj-frontend.onrender.com
      - key: NODE_ENV
        value: production

  # Frontend Static Site (React Build)
  - type: web
    name: swaraj-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://swaraj-backend.onrender.com
      - key: NPM_FLAGS
        value: --legacy-peer-deps

databases:
  - name: swaraj-db
    plan: free
    postgresMajorVersion: 15
