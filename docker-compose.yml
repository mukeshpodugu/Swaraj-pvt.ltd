version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: swaraj_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: swaraj_financepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: swaraj_backend_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/swaraj_financepro?schema=public
      - JWT_SECRET=swaraj-super-secret-key-12345
      - REFRESH_SECRET=swaraj-super-refresh-key-67890
      - FRONTEND_ORIGIN=http://localhost
      - NODE_ENV=production
    depends_on:
      - db
    command: sh -c "npx prisma db push && npx prisma db seed && node dist/index.js"

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: swaraj_frontend_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
